# Configuration for Multimodal Disaster Classification

data:
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  train_tsv: "data/raw/crisismmd_datasplit_all/crisismmd_datasplit_all/task_informative_text_img_train.tsv"
  val_tsv: "data/raw/crisismmd_datasplit_all/crisismmd_datasplit_all/task_informative_text_img_dev.tsv"
  test_tsv: "data/raw/crisismmd_datasplit_all/crisismmd_datasplit_all/task_informative_text_img_test.tsv"

text_model:
  max_features: 5000
  ngram_range: [1, 2]

image_model:
  backbone: "resnet50"  # Options: resnet50, efficientnet_b0
  pretrained: true
  freeze_backbone: true
  img_size: 224

multimodal_model:
  fusion_type: "concat"  # Options: concat, attention
  project_dim: 256
  dropout: 0.3
  num_classes: 2  # Will be adjusted dynamically based on classification task

training:
  batch_size: 32
  epochs: 10
  lr: 0.001
  weight_decay: 1e-4
  use_class_weights: true
  device: "mps"  # Options: cuda, mps, cpu
